<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- スマホ対応: 端末幅に合わせて描画 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ルピンスペシャル</title>
  <meta name="description" content="ルピンスペシャル - Apex Legends の現在マップ・次のマップ・切り替えまでの残り時間を表示します。" />

  <!-- ゲーミングフォント（Orbitron）: Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 背景に現在マップ画像をうっすら敷くレイヤー -->
  <div class="bg-layer" id="bg-layer"></div>
  <div class="bg-veil"></div>

  <div class="wrap">

    <!-- ヘッダー -->
    <header class="site-header">
      <div class="logo">
        <span class="logo-main">ルピンスペシャル</span>
        <span class="logo-sub">APEX MAP ROTATION</span>
      </div>

      <!-- モード切替タブ -->
      <div class="tabs" role="tablist" aria-label="モード切替">
        <button class="tab" role="tab" data-mode="battle_royale" aria-selected="false">カジュアル</button>
        <button class="tab" role="tab" data-mode="ranked" aria-selected="false">ランク</button>
      </div>
    </header>

    <!-- メインカード（現在のマップ） -->
    <section class="main-card" aria-label="現在のマップ">
      <!-- 左：マップ画像 -->
      <div class="main-visual" id="current-visual"></div>

      <!-- 右：情報 -->
      <div class="main-info">
        <div class="now-badge"><span class="dot"></span>NOW PLAYING</div>

        <h2 class="map-name-en" id="current-name-en">—</h2>
        <p class="map-name-jp" id="current-name-jp">—</p>
        <p class="map-range" id="current-range">--:-- 〜 --:-- (JST)</p>

        <hr class="divider" />

        <p class="cd-label">次のマップまで</p>
        <p class="countdown" id="countdown">00:00:00</p>

        <div class="next-line">
          <span class="next-tag">NEXT</span>
          <span class="next-name" id="next-name-en">—</span>
        </div>
      </div>
    </section>

    <!-- タイムライン（今後48時間） -->
    <section class="timeline-section" aria-label="今後の予定">
      <h3 class="section-title">UPCOMING</h3>
      <div class="timeline-groups" id="timeline"></div>
    </section>

    <footer class="site-footer">
      <p>ローテ定義は <code>rotation-data.js</code> を編集して更新できます。</p>
    </footer>

  </div>

  <!-- データ定義を先に読み込む -->
  <script src="rotation-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
